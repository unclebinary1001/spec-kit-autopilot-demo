      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Assignment ended
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Assignment' }
