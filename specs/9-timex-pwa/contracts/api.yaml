openapi: 3.0.3
info:
  title: TimeX API
  version: 1.0.0
  description: |
    Hono API serving the TimeX Employee PWA and Admin Portal.
    All tenant-scoped routes require a valid JWT access token.
    Base path: /api

    **Versioning strategy:** This API uses URL-path versioning. The current version is
    implicitly v1 (no prefix). When breaking changes are introduced, a `/v2/` prefix
    will be added to the base path and both versions will be served concurrently for
    a deprecation period. Non-breaking additions (new optional fields, new endpoints)
    are made to the current version without a new prefix.

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.timex.io/api
    description: Production

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PaginationLimit:
      name: limit
      in: query
      description: Maximum number of items to return
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    PaginationOffset:
      name: offset
      in: query
      description: Number of items to skip
      schema: { type: integer, minimum: 0, default: 0 }

  responses:
    InternalServerError:
      description: Unexpected server error. All error responses follow the Error schema.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: "Internal server error" }

  schemas:
    PaginatedMeta:
      type: object
      properties:
        total: { type: integer, description: Total number of matching items }
        limit: { type: integer }
        offset: { type: integer }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Unauthorized"

    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        primaryColor: { type: string, nullable: true }
        secondaryColor: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        logoDarkUrl: { type: string, nullable: true }

    Profile:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        email: { type: string, format: email }
        fullName: { type: string }
        avatarUrl: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive] }
        role: { type: string, enum: [employee, manager, admin] }

    PayPeriod:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { type: string, enum: [open, locked] }

    Client:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        name: { type: string }
        code: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive, discharged] }
        qboCustomerId: { type: string, nullable: true }

    TimesheetEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        timesheetId: { type: string, format: uuid }
        workDate: { type: string, format: date }
        clientId: { type: string, format: uuid, nullable: true }
        serviceType: { type: string, nullable: true }
        hours: { type: number, format: float }
        notes: { type: string, nullable: true }

    Timesheet:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        employeeId: { type: string, format: uuid }
        payPeriodId: { type: string, format: uuid }
        status:
          type: string
          enum: [draft, app_submitted, qbo_approved, qbo_synced, rejected]
        approvedBy: { type: string, format: uuid, nullable: true }
        submittedAt: { type: string, format: date-time, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        entries:
          type: array
          items: { $ref: '#/components/schemas/TimesheetEntry' }

    Expense:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        employeeId: { type: string, format: uuid }
        payPeriodId: { type: string, format: uuid, nullable: true }
        merchant: { type: string }
        category: { type: string }
        amount: { type: number, format: float }
        expenseDate: { type: string, format: date }
        receiptKey: { type: string, nullable: true }
        status: { type: string, enum: [draft, submitted, approved, rejected] }
        approvedBy: { type: string, format: uuid, nullable: true }
        notes: { type: string, nullable: true }

    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        tenantIds: { type: array, items: { type: string, format: uuid } }
        activeTenantId: { type: string, format: uuid }
        role: { type: string, enum: [employee, manager, admin] }

    QboStatus:
      type: object
      properties:
        connected: { type: boolean }
        realmId: { type: string, nullable: true }
        connectedAt: { type: string, format: date-time, nullable: true }
        connectedBy: { type: string, nullable: true }

    Assignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        employeeId: { type: string, format: uuid }
        clientId: { type: string, format: uuid }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }


paths:

  # ─── PUBLIC / NO AUTH ───────────────────────────────────────────────────────

  /org/{slug}/branding/public:
    get:
      summary: Get public tenant branding
      description: Returns tenant name, logo URL, and brand colors. Used on the login page before authentication.
      tags: [Branding]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tenant branding
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '404':
          description: Tenant not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/manifest.json:
    get:
      summary: Dynamic PWA manifest
      description: Returns a Web App Manifest with tenant-specific name and brand colors for PWA installation.
      tags: [Branding]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PWA Web App Manifest
          content:
            application/manifest+json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  short_name: { type: string }
                  theme_color: { type: string }
                  background_color: { type: string }
                  start_url: { type: string }
                  display: { type: string }
                  icons: { type: array }
        '404':
          description: Tenant not found
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /auth/magic-link:
    post:
      summary: Request a magic link
      description: Sends a one-time login link to the provided email address. Returns 200 even if email not found (prevents enumeration).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, slug]
              properties:
                email: { type: string, format: email }
                slug: { type: string, description: Tenant slug }
      responses:
        '200':
          description: Magic link sent (or silently ignored if email not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "If your email is registered, a link has been sent." }
        '429':
          description: Rate limit exceeded
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/verify:
    get:
      summary: Verify magic link token
      description: Validates a one-time token from a magic link email, issues JWT access token and httpOnly refresh cookie.
      tags: [Auth]
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '302':
          description: Redirect to tenant app with access token in body/cookie
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/login:
    post:
      summary: Password login (fallback)
      description: Authenticates with email + password. Issues JWT access token and httpOnly refresh cookie.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, slug]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                slug: { type: string }
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limit exceeded — 5 attempts per email per 15 minutes. Account locked after 10 consecutive failures for 30 minutes.
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/refresh:
    post:
      summary: Refresh access token
      description: Uses httpOnly refresh cookie to issue a new access token. No body required.
      tags: [Auth]
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401':
          description: Refresh token invalid or expired
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/logout:
    post:
      summary: Logout
      description: Clears the httpOnly refresh cookie.
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
        '500': { $ref: '#/components/responses/InternalServerError' }

  /auth/switch-tenant:
    post:
      summary: Switch active tenant
      description: For multi-tenant users — re-issues JWT with a different active_tenant_id.
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId: { type: string, format: uuid }
      responses:
        '200':
          description: New token with updated active_tenant_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '403':
          description: User does not belong to the requested tenant
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── TIMESHEETS ──────────────────────────────────────────────────────────────

  /org/{slug}/timesheets:
    get:
      summary: List timesheets
      description: Returns timesheets for the authenticated employee. Managers/admins receive all tenant timesheets.
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, app_submitted, qbo_approved, qbo_synced, rejected] }
        - name: payPeriodId
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: List of timesheets
          content:
            application/json:
              schema:
                type: object
                properties:
                  timesheets:
                    type: array
                    items: { $ref: '#/components/schemas/Timesheet' }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — wrong tenant }
        '500': { $ref: '#/components/responses/InternalServerError' }

    post:
      summary: Create a timesheet
      description: Creates a new draft timesheet for the current pay period. One per employee per pay period.
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payPeriodId]
              properties:
                payPeriodId: { type: string, format: uuid }
      responses:
        '201':
          description: Timesheet created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Timesheet' }
        '409': { description: Timesheet already exists for this pay period }
        '422': { description: Pay period is locked }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/timesheets/{id}:
    get:
      summary: Get a timesheet
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Timesheet with entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Timesheet' }
        '404': { description: Not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/timesheets/{id}/entries:
    post:
      summary: Add a timesheet entry
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workDate, hours]
              properties:
                workDate: { type: string, format: date }
                clientId: { type: string, format: uuid, nullable: true }
                serviceType: { type: string, nullable: true }
                hours: { type: number, minimum: 0.01 }
                notes: { type: string, nullable: true }
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TimesheetEntry' }
        '422': { description: Not assigned to this client / hours must be > 0 }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/timesheets/{id}/entries/{entryId}:
    delete:
      summary: Delete a timesheet entry
      description: Remove an entry from a draft timesheet. Only allowed when timesheet status is `draft`.
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: entryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Entry deleted }
        '403': { description: Not the timesheet owner }
        '404': { description: Entry not found }
        '422': { description: Timesheet is not in draft status }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/timesheets/{id}/status:
    patch:
      summary: Update timesheet status
      description: |
        Employees can transition: draft → app_submitted, rejected → app_submitted.
        Managers/admins can transition: app_submitted → qbo_approved, app_submitted → rejected.
      tags: [Timesheets]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [app_submitted, qbo_approved, rejected]
                note: { type: string, nullable: true, description: Required for rejection }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Timesheet' }
        '403': { description: Role not allowed for this transition }
        '422': { description: Invalid status transition }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── EXPENSES ────────────────────────────────────────────────────────────────

  /org/{slug}/expenses:
    get:
      summary: List expenses
      tags: [Expenses]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, submitted, approved, rejected] }
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items: { $ref: '#/components/schemas/Expense' }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
        '500': { $ref: '#/components/responses/InternalServerError' }

    post:
      summary: Create an expense
      tags: [Expenses]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [merchant, category, amount, expenseDate]
              properties:
                merchant: { type: string }
                category: { type: string }
                amount: { type: number, minimum: 0.01 }
                expenseDate: { type: string, format: date }
                payPeriodId: { type: string, format: uuid, nullable: true }
                notes: { type: string, nullable: true }
      responses:
        '201':
          description: Expense created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Expense' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/expenses/{id}:
    patch:
      summary: Update a draft expense
      description: Edit expense fields while in `draft` status. Cannot modify submitted/approved/rejected expenses.
      tags: [Expenses]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                merchant: { type: string }
                category: { type: string }
                amount: { type: number, minimum: 0.01 }
                expenseDate: { type: string, format: date }
                notes: { type: string, nullable: true }
                receiptKey: { type: string, nullable: true }
      responses:
        '200':
          description: Expense updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Expense' }
        '403': { description: Not the expense owner }
        '422': { description: Expense is not in draft status }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/expenses/{id}/status:
    patch:
      summary: Update expense status
      description: Employees submit; managers/admins approve or reject.
      tags: [Expenses]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [submitted, approved, rejected] }
                note: { type: string, nullable: true }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Expense' }
        '403': { description: Role not permitted }
        '422': { description: Invalid transition }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── CLIENTS ─────────────────────────────────────────────────────────────────

  /org/{slug}/clients:
    get:
      summary: List clients
      description: Returns all active clients for the tenant. Used to populate timesheet entry dropdowns.
      tags: [Clients]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive, discharged] }
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items: { $ref: '#/components/schemas/Client' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── PAY PERIODS (EMPLOYEE-ACCESSIBLE) ───────────────────────────────────────

  /org/{slug}/pay-periods:
    get:
      summary: List open pay periods
      description: Returns pay periods with status `open` for the tenant. Used by employees to select a pay period when creating a timesheet.
      tags: [Pay Periods]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of open pay periods
          content:
            application/json:
              schema:
                type: object
                properties:
                  payPeriods:
                    type: array
                    items: { $ref: '#/components/schemas/PayPeriod' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── FILE UPLOAD ─────────────────────────────────────────────────────────────

  /org/{slug}/upload/presign:
    post:
      summary: Get S3 presigned upload URL
      description: Returns a presigned PUT URL for direct browser-to-S3 upload. Key is prefixed with tenant_id.
      tags: [Upload]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, contentType, context]
              properties:
                filename: { type: string }
                contentType: { type: string, example: "image/jpeg" }
                context:
                  type: string
                  enum: [receipt, avatar, logo]
                  description: Determines the S3 key prefix
      responses:
        '200':
          description: Presigned URL and final S3 key
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadUrl: { type: string, format: uri }
                  key: { type: string, description: S3 object key to store on the record }
        '413': { description: File size exceeds 10 MB limit }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/upload/download-url:
    post:
      summary: Get S3 presigned download URL
      description: Validates that the requested key belongs to this tenant before generating a presigned GET URL.
      tags: [Upload]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key: { type: string, description: S3 object key }
      responses:
        '200':
          description: Presigned download URL (valid 15 minutes)
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl: { type: string, format: uri }
        '403': { description: Key does not belong to this tenant }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── PUSH NOTIFICATIONS ──────────────────────────────────────────────────────

  /org/{slug}/push/subscribe:
    post:
      summary: Register push subscription
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription, platform]
              properties:
                subscription:
                  type: object
                  description: Web Push subscription object (endpoint, keys.p256dh, keys.auth)
                platform:
                  type: string
                  enum: [web-mobile, web-portal, ios, android]
      responses:
        '201': { description: Subscription registered }
        '200': { description: Subscription already exists (idempotent) }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/push/unsubscribe:
    post:
      summary: Remove push subscription
      tags: [Notifications]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200': { description: Subscription removed }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ─── ADMIN ROUTES ─────────────────────────────────────────────────────────────

  /org/{slug}/admin/quickbooks:
    get:
      summary: Get QBO connection status
      description: Returns whether the tenant has a connected QBO account.
      tags: [Admin - QuickBooks]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: QBO connection status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QboStatus' }
        '403': { description: Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/quickbooks/connect:
    get:
      summary: Initiate QBO OAuth flow
      description: Generates CSRF state, stores in oauth_states, redirects to Intuit authorization URL.
      tags: [Admin - QuickBooks]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '302': { description: Redirect to Intuit OAuth authorization page }
        '403': { description: Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/quickbooks/callback:
    get:
      summary: QBO OAuth callback
      description: Receives authorization code from Intuit. Validates CSRF state, exchanges code for tokens, encrypts and stores.
      tags: [Admin - QuickBooks]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
        - name: realmId
          in: query
          required: true
          schema: { type: string }
      responses:
        '302': { description: Redirect to Admin Portal QBO settings page }
        '400': { description: Invalid state or missing parameters }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/quickbooks/disconnect:
    delete:
      summary: Disconnect QBO
      description: Revokes tokens at Intuit, deletes qbo_credentials row, writes to audit_logs.
      tags: [Admin - QuickBooks]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Disconnected successfully }
        '403': { description: Admin role required }
        '404': { description: No QBO connection found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/quickbooks/sync:
    post:
      summary: Trigger manual QBO sync
      description: Manually enqueues all qbo_approved timesheets for sync. Useful for recovery after QBO outage.
      tags: [Admin - QuickBooks]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '202': { description: Sync jobs enqueued }
        '403': { description: Admin role required }
        '503': { description: QBO not connected }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/employees:
    get:
      summary: List employees
      tags: [Admin - Employees]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of profiles with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  employees:
                    type: array
                    items: { $ref: '#/components/schemas/Profile' }
        '403': { description: Manager or Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/clients:
    get:
      summary: List all clients (admin)
      tags: [Admin - Clients]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: All clients for tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items: { $ref: '#/components/schemas/Client' }
        '403': { description: Manager or Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

    post:
      summary: Create a client
      tags: [Admin - Clients]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                code: { type: string, nullable: true }
                qboCustomerId: { type: string, nullable: true }
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }
        '403': { description: Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/clients/{id}:
    patch:
      summary: Update a client
      description: Update client details (name, code, QBO customer ID, status).
      tags: [Admin - Clients]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string, nullable: true }
                status: { type: string, enum: [active, inactive, discharged] }
                qboCustomerId: { type: string, nullable: true }
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Client' }
        '403': { description: Admin role required }
        '404': { description: Client not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/employees/{id}:
    patch:
      summary: Update an employee profile
      description: Update employee status (active/inactive) and role.
      tags: [Admin - Employees]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [active, inactive] }
                role: { type: string, enum: [employee, manager, admin] }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Profile' }
        '403': { description: Admin role required }
        '404': { description: Employee not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/pay-periods/{id}/lock:
    patch:
      summary: Lock a pay period
      description: Transition a pay period from `open` to `locked`. Prevents new timesheet creation for this period.
      tags: [Admin - Pay Periods]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pay period locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PayPeriod' }
        '403': { description: Admin role required }
        '422': { description: Pay period is already locked }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /org/{slug}/admin/assignments:
    get:
      summary: List assignments
      tags: [Admin - Assignments]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Assignments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignments:
                    type: array
                    items: { $ref: '#/components/schemas/Assignment' }
        '403': { description: Admin role required }
        '500': { $ref: '#/components/responses/InternalServerError' }

    post:
      summary: Create an assignment
      tags: [Admin - Assignments]
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
